<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Connecting Strava…</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;700&family=DM+Mono:wght@400&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'DM Sans',sans-serif;background:#0f0e0d;color:#f5f2ee;min-height:100vh;display:flex;align-items:center;justify-content:center;text-align:center;padding:20px}
.box{max-width:400px}
.logo{font-size:60px;margin-bottom:16px}
h1{font-size:24px;font-weight:700;margin-bottom:8px}
p{color:#7a7268;font-size:14px;line-height:1.6}
.spinner{width:32px;height:32px;border:3px solid rgba(255,255,255,.1);border-top-color:#fc4c02;border-radius:50%;animation:spin .6s linear infinite;margin:20px auto}
@keyframes spin{to{transform:rotate(360deg)}}
.err{background:#fde8e6;color:#c0392b;border-radius:6px;padding:14px 16px;font-size:13px;margin-top:16px;display:none}
.success{color:#2d6a4f;font-size:14px;font-weight:600;margin-top:16px;display:none}
</style>
</head>
<body>
<div class="box">
  <div class="logo">🧡</div>
  <h1>Connecting Strava</h1>
  <p>Exchanging authorisation code…</p>
  <div class="spinner" id="spinner"></div>
  <div class="err" id="err"></div>
  <div class="success" id="success">✓ Connected! Redirecting…</div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
const STRAVA_CLIENT_ID = '232438';
const STRAVA_CLIENT_SECRET = 'ab41406085d2bc86b85e048441e2da86a914ab5b';
const REDIRECT_URI = 'https://codypete.github.io/casey-marathon/strava-callback.html';

async function handleCallback() {
  const params = new URLSearchParams(window.location.search);
  const code = params.get('code');
  const error = params.get('error');

  if (error) {
    showError('Strava authorisation was denied or cancelled.');
    return;
  }
  if (!code) {
    showError('No authorisation code received from Strava.');
    return;
  }

  try {
    const res = await fetch('https://www.strava.com/oauth/token', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        client_id: STRAVA_CLIENT_ID,
        client_secret: STRAVA_CLIENT_SECRET,
        code: code,
        grant_type: 'authorization_code',
      }),
    });

    if (!res.ok) {
      const err = await res.json();
      throw new Error(err.message || 'Token exchange failed');
    }

    const data = await res.json();

    // Store token in localStorage (same origin — will be available on dashboard)
    localStorage.setItem('strava_token', JSON.stringify(data));

    document.getElementById('spinner').style.display = 'none';
    document.getElementById('success').style.display = 'block';

    // Redirect back to dashboard after short delay
    setTimeout(() => {
      window.location.href = 'dashboard.html?strava=connected';
    }, 1500);

  } catch(e) {
    showError('Connection failed: ' + e.message + '. Please try again.');
  }
}

function showError(msg) {
  document.getElementById('spinner').style.display = 'none';
  const errEl = document.getElementById('err');
  errEl.textContent = msg;
  errEl.style.display = 'block';
  setTimeout(() => { window.location.href = 'dashboard.html'; }, 4000);
}

handleCallback();
</script>
</body>
</html>
